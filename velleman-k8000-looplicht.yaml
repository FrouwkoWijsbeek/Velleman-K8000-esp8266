  # Zoek je bestaande template switch en vervang de turn_off_action:
  - platform: template
    name: "K8000 Looplicht 16 kanalen"
    id: loop_knop
    turn_on_action:
      - script.execute: looplicht_16
    turn_off_action:
      - script.stop: looplicht_16
      - switch.turn_off: uit1
      - switch.turn_off: uit2
      - switch.turn_off: uit3
      - switch.turn_off: uit4
      - switch.turn_off: uit5
      - switch.turn_off: uit6
      - switch.turn_off: uit7
      - switch.turn_off: uit8
      - switch.turn_off: uit9
      - switch.turn_off: uit10
      - switch.turn_off: uit11
      - switch.turn_off: uit12
      - switch.turn_off: uit13
      - switch.turn_off: uit14
      - switch.turn_off: uit15
      - switch.turn_off: uit16


# 3. Het Effect Script
script:
  - id: looplicht_16
    mode: restart
    then:
      - while:
          condition:
            lambda: 'return true;'
          then:
            - lambda: |-
                // Definieer de array met auto om de 'switch' naam-conflict te vermijden
                auto lampjes = std::vector<gpio::GPIOSwitch*>{
                  id(uit1), id(uit2), id(uit3), id(uit4), id(uit5), id(uit6), id(uit7), id(uit8),
                  id(uit9), id(uit10), id(uit11), id(uit12), id(uit13), id(uit14), id(uit15), id(uit16)
                };

                // Heen
                for (int i = 0; i < 16; i++) {
                  lampjes[i]->turn_on();
                  delay(80);
                  lampjes[i]->turn_off();
                }
                // Terug
                for (int i = 14; i >= 1; i--) {
                  lampjes[i]->turn_on();
                  delay(80);
                  lampjes[i]->turn_off();
                }



